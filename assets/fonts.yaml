# Use static Roboto (has kern table). Variable Roboto[wdth,wght] uses GPOS-only
# kerning; FreeType's TT_CONFIG_OPTION_GPOS_KERNING has limited variable font
# support. Static Roboto-Regular from googlefonts/roboto has a kern table.
fonts:
  - id: roboto_regular
    url: "https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Regular.ttf"
  - id: roboto_bold
    url: "https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf"

  - id: material_symbols_outlined
    url: "https://raw.githubusercontent.com/google/material-design-icons/master/variablefont/MaterialSymbolsOutlined%5BFILL%2CGRAD%2Copsz%2Cwght%5D.ttf"
    codepoints_url: "https://raw.githubusercontent.com/google/material-design-icons/master/variablefont/MaterialSymbolsOutlined%5BFILL%2CGRAD%2Copsz%2Cwght%5D.codepoints"
    # Optional variable-font axis coordinates.
    # Common Material Symbols axes: FILL (0..1), GRAD, opsz, wght.
    axes:
      FILL: 0
      GRAD: 200
      opsz: 24
      wght: 700
    icons:
      - search
      - home
      - settings
      - check
